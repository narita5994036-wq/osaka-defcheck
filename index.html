<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SHOP Osaka — Defective Check</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{color-scheme:light only;--w:#ffffff;--k:#000000;--g50:#fafafa;--g100:#f5f5f5;--g200:#eeeeee;--g400:#bdbdbd;--g600:#757575;--g800:#424242;--red:#c62828;--redL:#ffebee;--redM:#ef9a9a;--blue:#1565c0;--blueL:#e3f2fd;--green:#2e7d32;--greenL:#e8f5e9;--amber:#e65100;--amberL:#fff3e0;--teal:#00695c;--tealL:#e0f2f1}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{color-scheme:light only!important;forced-color-adjust:none!important}
  html,body{height:100%;background:#ffffff!important;font-family:'Montserrat',sans-serif;color:#000000!important}
  @media(prefers-color-scheme:dark){
    html,body{background:#ffffff!important;color:#000000!important}
    .hdr{background:#ffffff!important;border-color:#eeeeee!important}
    .stat{background:#f5f5f5!important}
    .item-name,.ti,.inv-no{color:#000000!important}
    .ey,.inv-ct,.inv-dt,.item-no,.stat-l,.item-code,.up-sub{color:#bdbdbd!important}
    .up-tit{color:#424242!important}
    .sbtn{background:#ffffff!important;color:#757575!important;border-color:#eeeeee!important}
    .sbtn.ok{background:#e8f5e9!important;color:#2e7d32!important;border-color:#2e7d32!important}
    .sbtn.def{background:#ffebee!important;color:#c62828!important;border-color:#c62828!important}
    .sbtn.war{background:#e3f2fd!important;color:#1565c0!important;border-color:#1565c0!important}
    .def-sum{background:#ffebee!important}
    .def-sum-tit,.def-li-rm{color:#c62828!important}
    .def-li-hd,.def-li-no{color:#000000!important}
    .war-sum{background:#e3f2fd!important}
    .war-sum-tit{color:#1565c0!important}
    .war-li{color:#000000!important}
    .alert{background:#fff3e0!important;color:#e65100!important}
    .tag.parts{background:#e0f2f1!important;color:#00695c!important}
    .tag.sun{background:#fff3e0!important;color:#e65100!important}
    .tag.rx{background:#e3f2fd!important;color:#1565c0!important}
    .tag.qty{background:#f5f5f5!important;color:#757575!important}
    .rmk-inp{background:#ffebee!important;color:#c62828!important;border-color:#ef9a9a!important}
    .rawbox{background:#fafafa!important;color:#424242!important}
    .upzone,.nlz{border-color:#bdbdbd!important;background:#ffffff!important}
    .upzone:active,.nlz:active{background:#fafafa!important}
    .sheet,.ef input,.ef textarea,.mfield input,.mrow input{background:#ffffff!important;color:#000000!important;border-color:#eeeeee!important}
    .sheet{background:#ffffff!important}
    .sheet-tit{color:#000000!important}
    .ef label,.mfield label{color:#bdbdbd!important}
    .btn.blk{background:#000000!important;color:#ffffff!important}
    .btn.out{background:#ffffff!important;color:#757575!important;border-color:#eeeeee!important}
    .tab{color:#757575!important}
    .tab.act{color:#000000!important;border-color:#000000!important}
    .tabs{border-color:#eeeeee!important}
    .item{border-color:#f5f5f5!important}
    .prog-bar{background:#eeeeee!important}
    .prog-fill{background:#000000!important}
  }
  .hdr{position:sticky;top:0;z-index:100;background:var(--w);border-bottom:1px solid var(--g200);padding:max(14px,env(safe-area-inset-top)) 20px 12px;display:flex;align-items:center;justify-content:space-between}
  .ey{font-size:9px;letter-spacing:4px;color:var(--g400)}
  .ti{font-size:13px;font-weight:600;letter-spacing:3px}
  .hdr-acts{display:flex;gap:10px}
  .ibtn{background:none;border:none;cursor:pointer;padding:6px;color:var(--g600);font-size:16px;border-radius:6px}
  .ibtn:active{background:var(--g100)}
  .upzone{margin:28px 20px;border:1px dashed var(--g400);border-radius:4px;padding:44px 20px;text-align:center;cursor:pointer;position:relative;transition:background .15s}
  .upzone:active{background:var(--g50)}
  .upzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .up-icon{font-size:32px;margin-bottom:12px}
  .up-tit{font-size:11px;letter-spacing:3px;color:var(--g800);font-weight:500}
  .up-sub{font-size:10px;color:var(--g400);margin-top:6px;letter-spacing:1px}
  .lbar{height:2px;background:var(--g200);margin:0 20px;border-radius:1px;overflow:hidden}
  .lfill{height:100%;background:var(--k);animation:ld 1.2s ease-in-out infinite}
  @keyframes ld{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
  @keyframes glassespin{from{transform:perspective(120px) rotateY(0deg)}to{transform:perspective(120px) rotateY(360deg)}}
  .glass-spin{animation:glassespin 2s linear infinite;display:block}
  .ltxt{text-align:center;font-size:10px;letter-spacing:2px;color:var(--g600);padding:12px 20px 0}
  .nlz{margin:10px 20px 0;border:1px dashed var(--g200);border-radius:4px;padding:11px 16px;text-align:center;cursor:pointer;position:relative}
  .nlz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .nlz span{font-size:10px;letter-spacing:2px;color:var(--g400)}
  .inv-hdr{padding:20px 20px 0}
  .inv-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3px}
  .inv-no{font-size:19px;font-weight:500;letter-spacing:1.5px}
  .inv-ct{font-size:10px;color:var(--g400);letter-spacing:1px}
  .inv-dt{font-size:10px;color:var(--g400);letter-spacing:1px}
  .prog-wrap{padding:14px 20px 4px}
  .prog-bar{height:1px;background:var(--g200);border-radius:1px}
  .prog-fill{height:100%;background:var(--k);border-radius:1px;transition:width .4s}
  .stats{display:flex;gap:6px;padding:12px 20px}
  .stat{flex:1;background:var(--g50);border-radius:4px;padding:9px 6px;text-align:center}
  .stat-n{font-size:18px;font-weight:500}
  .stat-l{font-size:9px;letter-spacing:1px;color:var(--g600);margin-top:1px}
  .stat.pend .stat-n{color:var(--g400)}.stat.ok .stat-n{color:var(--green)}.stat.def .stat-n{color:var(--red)}.stat.war .stat-n{color:var(--blue)}
  .tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--g200);overflow-x:auto}
  .tab{flex-shrink:0;padding:10px 14px;font-size:9px;letter-spacing:2px;color:var(--g600);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
  .tab.act{color:var(--k);border-bottom-color:var(--k)}
  .cl{padding:0 20px}
  .item{border-bottom:1px solid var(--g100);padding:11px 0}
  .item-row{display:flex;align-items:center;gap:10px}
  .item-no{min-width:22px;font-size:10px;color:var(--g400);text-align:right;font-weight:500}
  .item-body{flex:1;min-width:0}
  .item-tags{display:flex;gap:5px;margin-bottom:3px;align-items:center}
  .tag{font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:2px;font-weight:500}
  .tag.parts{background:var(--tealL);color:var(--teal)}.tag.sun{background:var(--amberL);color:var(--amber)}.tag.rx{background:var(--blueL);color:var(--blue)}.tag.qty{background:var(--g100);color:var(--g600)}
  .item-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-code{font-size:10px;color:var(--g600);font-family:monospace;letter-spacing:.5px;margin-top:1px}
  .sbtn{flex-shrink:0;min-width:64px;padding:8px 4px;border:1px solid var(--g200);font-size:9px;letter-spacing:1.5px;font-weight:600;border-radius:3px;cursor:pointer;font-family:inherit;background:var(--w);color:var(--g600);user-select:none}
  .sbtn:active{opacity:.7}
  .sbtn.ok{background:var(--greenL);color:var(--green);border-color:var(--green)}
  .sbtn.def{background:var(--redL);color:var(--red);border-color:var(--red)}
  .sbtn.war{background:var(--blueL);color:var(--blue);border-color:var(--blue)}
  .rmk-row{margin-top:10px;margin-left:32px}
  .rmk-inp{width:100%;padding:8px 12px;border:1px solid var(--redM);border-radius:3px;font-size:12px;font-family:inherit;background:var(--redL);color:var(--red);outline:none}
  .rmk-inp::placeholder{color:var(--redM)}
  .def-sum{margin:16px 20px;background:var(--redL);border-radius:4px;padding:16px}
  .def-sum-tit{font-size:9px;letter-spacing:3px;color:var(--red);font-weight:600;margin-bottom:14px}
  .def-li{margin-bottom:10px}
  .def-li-hd{font-size:12px;font-weight:500}
  .def-li-no{color:var(--g400);margin-right:5px;font-size:11px}
  .def-li-rm{font-size:11px;color:var(--red);margin-top:2px}
  .war-sum{margin:16px 20px;background:var(--blueL);border-radius:4px;padding:16px}
  .war-sum-tit{font-size:9px;letter-spacing:3px;color:var(--blue);font-weight:600;margin-bottom:14px}
  .war-li{font-size:12px;margin-bottom:6px;display:flex;gap:8px}
  .war-li-no{color:var(--g400);min-width:24px;text-align:right}
  .btn{width:100%;padding:13px;border:none;cursor:pointer;font-size:10px;letter-spacing:3px;font-weight:500;font-family:inherit;border-radius:3px;margin-top:12px}
  .btn.blk{background:var(--k);color:var(--w)}.btn.blk:active{opacity:.8}
  .btn.out{background:var(--w);color:var(--g600);border:1px solid var(--g200);margin-top:8px}.btn.out:active{background:var(--g50)}
  .alert{margin:0 20px 16px;padding:12px 14px;background:var(--amberL);border-radius:4px;font-size:11px;color:var(--amber);letter-spacing:.3px}
  .mpanel{margin:0 20px 20px}
  .mpanel h3{font-size:10px;letter-spacing:3px;color:var(--g600);margin-bottom:12px;font-weight:500}
  .mfield{margin-bottom:12px}
  .mfield label{font-size:9px;letter-spacing:2px;color:var(--g400);display:block;margin-bottom:4px}
  .mfield input{width:100%;padding:9px 12px;border:1px solid var(--g200);border-radius:3px;font-size:12px;font-family:monospace;background:var(--w);color:var(--k);outline:none}
  .mfield input:focus{border-color:var(--k)}
  .mrow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  .mrow input{padding:8px 10px;border:1px solid var(--g200);border-radius:3px;font-size:12px;font-family:monospace;outline:none;background:var(--w);color:var(--k)}
  .mrow input:focus{border-color:var(--k)}
  .fn{width:44px!important}.fc{width:100px!important}.fd{flex:1}
  .delbtn{background:none;border:none;cursor:pointer;color:var(--g400);font-size:18px;padding:2px;flex-shrink:0}
  details.raw{margin:0 20px 16px}
  details.raw summary{font-size:10px;letter-spacing:2px;color:var(--g600);cursor:pointer;padding:10px 0;list-style:none}
  details.raw summary::-webkit-details-marker{display:none}
  .rawbox{background:var(--g50);border:1px solid var(--g200);padding:10px;font-size:10px;font-family:monospace;white-space:pre-wrap;max-height:180px;overflow-y:auto;color:var(--g800);border-radius:3px;margin-top:6px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
  .sheet{background:var(--w);width:100%;border-radius:12px 12px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));max-height:82vh;overflow-y:auto;overscroll-behavior:contain}
  .sheet-tit{font-size:11px;letter-spacing:3px;font-weight:600;margin-bottom:16px}
  .close-btn{float:right;background:none;border:none;cursor:pointer;color:var(--g400);font-size:22px;line-height:1}
  .ef{margin-bottom:13px}
  .ef label{font-size:9px;letter-spacing:2px;color:var(--g400);display:block;margin-bottom:5px}
  .ef input,.ef textarea{width:100%;padding:10px 12px;border:1px solid var(--g200);border-radius:3px;font-size:12px;font-family:inherit;background:var(--w);color:var(--k);outline:none;resize:vertical}
  .ef textarea{min-height:190px}
  .eacts{display:flex;gap:10px;margin-top:12px}
  .eacts .btn{margin-top:0}
  .eacts .btn.s{flex-shrink:0;width:auto;padding:13px 16px;font-size:10px}
  .bot{height:max(60px,env(safe-area-inset-bottom))}
  .fab{position:fixed;bottom:28px;right:20px;width:44px;height:44px;border-radius:50%;background:#000;color:#fff;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.3);z-index:200}
  .fab:active{opacity:.7}
  /* DEFECT PICKER */
  .dpick{margin-top:10px;margin-left:32px;background:#fff8f8;border:1px solid var(--redM);border-radius:6px;padding:12px 14px}
  .dpick-row{margin-bottom:10px}
  .dpick-row:last-child{margin-bottom:0}
  .dpick-label{font-size:9px;letter-spacing:2px;color:var(--red);font-weight:600;margin-bottom:7px}
  .dpick-pills{display:flex;flex-wrap:wrap;gap:6px}
  .pill{padding:5px 11px;border-radius:999px;border:1px solid var(--redM);font-size:11px;font-weight:500;
    cursor:pointer;background:#fff;color:var(--red);user-select:none;transition:background .1s}
  .pill:active{opacity:.7}
  .pill-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:3px}
  .pill-tip{font-size:8px;color:var(--redM);letter-spacing:.3px;white-space:nowrap}
  .pill-wrap .pill.sel+.pill-tip{color:var(--red)}
  .pill.sel{background:var(--red);color:#fff;border-color:var(--red)}
  .pill-other{padding:5px 11px;border-radius:999px;border:1px dashed var(--redM);font-size:11px;
    cursor:pointer;background:#fff;color:var(--redM);user-select:none}
  .pill-other.sel{border-style:solid;color:var(--red)}
  .dpick-other-input{margin-top:8px}
  .dpick-other-input input{width:100%;padding:7px 11px;border:1px solid var(--redM);border-radius:20px;
    font-size:12px;font-family:inherit;background:#fff;color:var(--red);outline:none}
  .dpick-other-input input::placeholder{color:var(--redM)}
  .dpick-entry{margin-bottom:0}
  .dpick-entry-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .dpick-entry-num{font-size:9px;letter-spacing:2px;color:var(--redM);font-weight:600}
  .dpick-del{background:none;border:none;cursor:pointer;font-size:10px;color:var(--redM);font-family:inherit;padding:2px 0;letter-spacing:.5px}
  .dpick-del:active{color:var(--red)}
  .dpick-divider{height:1px;background:var(--redM);opacity:.3;margin:12px 0}
  .dpick-add{width:100%;margin-top:12px;padding:8px;background:none;border:1px dashed var(--redM);border-radius:4px;color:var(--red);font-size:10px;letter-spacing:2px;font-weight:600;cursor:pointer;font-family:inherit}
  .dpick-add:active{background:var(--redL)}
  @media(prefers-color-scheme:dark){
    .dpick{background:#fff8f8!important;border-color:var(--redM)!important}
    .pill{background:#fff!important;color:var(--red)!important}
    .pill.sel{background:var(--red)!important;color:#fff!important}
    .dpick-other-input input{background:#fff!important;color:var(--red)!important}
  }
  .grp-hdr{padding:12px 0 6px;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--g200);margin-top:4px}
  .grp-hdr-name{font-size:12px;font-weight:500}
  .grp-hdr-code{font-size:10px;color:var(--g600);font-family:monospace;letter-spacing:.5px}
  .grp-hdr-tags{display:flex;gap:5px;align-items:center;margin-left:auto}
  .sub-item{border-bottom:1px solid var(--g100);padding:10px 0 10px 32px}
  .sub-item-row{display:flex;align-items:center;gap:10px}
  .sub-idx{min-width:32px;font-size:10px;color:var(--g400);text-align:right;font-weight:500}
  .sub-bar{width:2px;background:var(--g200);border-radius:1px;align-self:stretch;flex-shrink:0;margin-right:2px}
  .def-inline{display:flex;align-items:baseline;gap:6px;margin-top:4px;margin-left:32px;cursor:pointer}
  .def-inline-txt{font-size:10px;color:var(--red);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .def-inline-edit{font-size:9px;letter-spacing:1.5px;color:var(--redM);flex-shrink:0;padding:2px 6px;border:1px solid var(--redM);border-radius:3px;background:none;cursor:pointer;font-family:inherit;font-weight:500}
  .def-inline-edit:active{background:var(--redL)}
  .def-inline-empty{font-size:10px;color:var(--redM);font-style:italic}
  /* PHOTOS */
  .photo-section{margin-top:10px;margin-left:32px}
  .photo-section-lbl{font-size:9px;letter-spacing:2px;color:var(--red);font-weight:600;margin-bottom:7px}
  .photo-strip{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-left:32px;margin-top:6px}
  .photo-section .photo-strip{margin-left:0}
  .photo-thumb-wrap{position:relative;flex-shrink:0}
  .photo-thumb{width:64px;height:64px;object-fit:cover;border-radius:4px;border:1px solid var(--redM);cursor:pointer;display:block}
  .photo-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:11px;line-height:18px;text-align:center;padding:0}
  .photo-add-btn{width:48px;height:64px;border:1px dashed var(--redM);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--redM);cursor:pointer;flex-shrink:0}
  .photo-add-btn:active{background:var(--redL)}
  /* MARKUP EDITOR */
  .mkup{position:fixed;inset:0;z-index:400;background:#111;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
  .mkup-toolbar{display:flex;align-items:center;gap:0;padding:10px 16px;background:#1a1a1a;flex-shrink:0}
  .mkup-title{flex:1;font-size:11px;letter-spacing:3px;color:#fff;text-align:center}
  .mkup-tbtn{background:none;border:none;cursor:pointer;color:#888;font-size:22px;padding:6px 10px;border-radius:6px;font-family:inherit;line-height:1}
  .mkup-tbtn:active{background:#333}
  .mkup-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .mkup-canvas-wrap canvas{max-width:100%;max-height:100%;touch-action:none}
  .mkup-label-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#222;flex-shrink:0;border-top:1px solid #333}
  .mkup-label-lbl{font-size:9px;letter-spacing:2px;color:#666;flex-shrink:0}
  .mkup-label-inp{flex:1;background:#1a1a1a;border:1.5px solid #444;color:#ef5350;font-size:16px;font-weight:600;padding:8px 12px;border-radius:6px;outline:none;font-family:inherit}
  .mkup-label-inp:focus{border-color:#ef5350}
  .mkup-actions{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px max(12px,env(safe-area-inset-bottom));background:#1a1a1a;flex-shrink:0}
  .mkup-cancel{padding:10px 20px;border-radius:6px;border:1.5px solid #444;background:none;color:#aaa;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
  .mkup-cancel:active{opacity:.7}
  .mkup-done{padding:10px 32px;border-radius:6px;border:none;background:#fff;color:#000;font-size:11px;letter-spacing:2px;font-weight:600;cursor:pointer;font-family:inherit}
  .mkup-done:active{opacity:.8}
  .mkup-hint{text-align:center;font-size:10px;color:#444;letter-spacing:1px;padding:6px 16px 0;background:#1a1a1a;flex-shrink:0}
  .mkup-reedit-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;overflow:hidden}
  .mkup-reedit-ttl{font-size:10px;letter-spacing:2px;color:#888}
  .mkup-reedit-img{max-width:100%;max-height:52vh;object-fit:contain;border-radius:4px;border:1px solid #333}
  .mkup-preview-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px;overflow:hidden}
  .mkup-preview-lbl{font-size:10px;letter-spacing:2px;color:#888}
  .mkup-preview-img{max-width:100%;max-height:56vh;object-fit:contain;border-radius:4px;border:1px solid #333}
  .mkup-reedit-hint{font-size:12px;color:#aaa;text-align:center}
  /* PHOTO VIEWER */
  .photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .photo-viewer img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:4px}
  .photo-viewer-close{position:absolute;top:max(16px,env(safe-area-inset-top));right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}
  .photo-viewer-del{margin-top:16px;padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:4px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:inherit;font-weight:500}
  @media(prefers-color-scheme:dark){
    .photo-thumb{border-color:var(--redM)!important}

function buildProcessChain(rootInvId,rootItemNo){
  const allInvs={};
  loadList().forEach(e=>{try{const d=localStorage.getItem('mykita_dc_inv_'+e.id);if(!d)return;const inv=JSON.parse(d);allInvs[e.id]={...inv,items:inv.items.map(it=>{const patch=_pnListChanges[e.id+'|'+it.no];return patch?{...it,...patch}:it;})};}catch(x){}});
  const steps=[];
  function traverse(invId,item,depth){
    const inv=allInvs[invId];if(!inv)return;
    steps.push({type:depth===0?'order':'delivery',invNumber:inv.number||invId,cat:item.cat,name:item.name,no:item.subOf||item.no});
    if(item.status==='defective'){
      steps.push({type:'defective'});
      if(item.pn)steps.push({type:'pn',pn:item.pn});
      if(item.pn){
        for(const[cId,cInv]of Object.entries(allInvs)){
          if(cId===invId)continue;
          const child=cInv.items.find(it=>it.orderNo&&it.orderNo.trim()===item.pn.trim());
          if(child){traverse(cId,child,depth+1);break;}
        }
      }
    }else if(item.status==='ok'){
      steps.push({type:'ok_receiving',invNumber:inv.number||invId});
    }else{
      steps.push({type:'pending'});
    }
  }
  const rootInv=allInvs[rootInvId];if(!rootInv)return null;
  const rootItem=rootInv.items.find(i=>i.no===rootItemNo);if(!rootItem)return null;
  traverse(rootInvId,rootItem,0);
  return{steps,title:rootItem.name+(rootItem.colorCode?' #'+rootItem.colorCode:'')};
}

function parseMsgForPns(raw){
  const blocks=raw.split(/Position\s+Number\/Item\s*:/i);
  const results=[];
  for(let i=1;i<blocks.length;i++){
    const block=blocks[i];
    const posMatch=block.match(/^\s*(\d+)\./);
    if(!posMatch)continue;
    const pos=posMatch[1];
    const pnMatch=block.match(/[Rr]eplacement[\s\S]{0,400}?<b[^>]*>\s*(\d{6,7})\s*<\/b>/i);
    const claimMatch=block.match(/postal\s+claim[:\s]+(?:<[^>]+>)*\s*(\d{5,12})/i);
    const pn=pnMatch?pnMatch[1]:'';
    const claimNo=claimMatch?claimMatch[1]:'';
    if(pn||claimNo)results.push({pos,pn,claimNo});
  }
  return results;
}
function extractPdfNamesFromMsg(bytes){
  // PDF attachment filenames are stored as UTF-16LE in .msg binary
  const names=new Set();
  for(let i=0;i+1<bytes.length;i+=2){
    let s='';
    for(let j=i;j+1<bytes.length;j+=2){
      const c=bytes[j]|(bytes[j+1]<<8);
      if(c>=32&&c<=126)s+=String.fromCharCode(c);
      else break;
    }
    const m=s.match(/^([\w\-]{4,40}\.pdf)$/i);
    if(m)names.add(m[1].replace(/\.pdf$/i,''));
  }
  return names;
}
async function handleMsgUpload(f){
  if(!f||!_dispSheet)return;
  try{
    const buf=await f.arrayBuffer();
    const bytes=new Uint8Array(buf);
    let raw='';
    for(let i=0;i<bytes.length;i++){const b=bytes[i];raw+=(b>=32&&b<=126||b===9||b===10||b===13)?String.fromCharCode(b):' ';}
    const pdfNames=extractPdfNamesFromMsg(bytes);
    const mappings=parseMsgForPns(raw);
    if(!mappings.length){alert('PNマッピングが見つかりませんでした。\nファイルを確認してください。');return;}
    // claim番号が添付PDFファイル名と一致 → Return
    mappings.forEach(m=>{if(m.claimNo&&pdfNames.has(m.claimNo))m.disp='return';});
    const lines=mappings.map(m=>`Pos ${m.pos}${m.pn?' → PN: '+m.pn:''}${m.disp==='return'?' [Return]':''}`).join('\n');
    if(!confirm('以下の内容を自動入力します:\n\n'+lines+'\n\nOK = 適用\nキャンセル = 中止'))return;
    _dispSheet.inv.items=_dispSheet.inv.items.map(it=>{
      const match=mappings.find(m=>it.no===m.pos||it.subOf===m.pos||it.no.startsWith(m.pos+'-'));
      if(!match)return it;
      const update={...it};
      if(match.pn)update.pn=match.pn;
      if(match.disp)update.disp=match.disp;
      return update;
    });
    render();
  }catch(e){alert('.msg/.emlファイルの読み込みエラー: '+e.message);}
}

function getDnpSc(pn,orderNoMap){
  if(!pn||!orderNoMap[pn])return null;

    const cr=(m.custRef||'').toLowerCase();
    if(cr.includes('shop breakage'))return'SB';
    if(cr.includes('def stock')||cr.includes('stock claim'))return'DS';
    if(cr.includes('def')){
      if(cr.includes('new')||cr.includes('prod'))return'DNP';

    }
  }

function _downloadCSV(fname,rows){
  if(typeof Encoding==='undefined'){alert('Encoding library not loaded. Please reload the page.');return;}
  const fs=getCsvFieldSettings();
  const masked=rows.map(r=>r.map((c,i)=>fs[CSV_FIELD_KEYS[i]]===false?'':c));
  const csv=[DISP_HEADER,...masked].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const arr=Encoding.convert(Encoding.stringToCode(csv),'SJIS','UNICODE');
  const blob=new Blob([new Uint8Array(arr)],{type:'text/csv;charset=shift_jis'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

function _swGetXY(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
function _swGetEndXY(e){return e.changedTouches?{x:e.changedTouches[0].clientX}:{x:e.clientX};}
function swStart(e,id){
  if(e.button&&e.button!==0)return;
  if(_sw.openId&&_sw.openId!==id){
    const prev=document.querySelector(`.inv-swipe-wrap[data-id="${_sw.openId}"] .inv-card`);
    if(prev){prev.style.transition='transform .2s ease';prev.style.transform='translateX(0)';}
    _sw.openId=null;_sw.openDir=null;
  }
  const wrap=e.currentTarget;
  const el=wrap.querySelector('.inv-card');
  const actLeft=wrap.querySelector('.inv-swipe-left');
  const actRight=wrap.querySelector('.inv-swipe-right');
  const {x,y}=_swGetXY(e);
  const initOffset=_sw.openId===id?(_sw.openDir==='right'?actLeft.offsetWidth:-(actRight.offsetWidth)):0;
  _sw.state={el,actLeft,actRight,id,startX:x,startY:y,started:false,initOffset,dir:null,isMouse:!e.touches};
}
function swMove(e){
  const s=_sw.state;if(!s)return;
  const {x,y}=_swGetXY(e);
  const dx=x-s.startX,dy=y-s.startY;
  if(!s.started){
    if(Math.abs(dx)<4&&Math.abs(dy)<4)return;
    if(!s.isMouse&&Math.abs(dy)>=Math.abs(dx)){_sw.state=null;return;}
    s.started=true;
    s.dir=_sw.openId===s.id?_sw.openDir:(dx>0?'right':'left');
  }
  e.preventDefault();
  const raw=s.initOffset+dx;
  s.el.style.transition='none';
  if(s.dir==='right'){
    const aw=s.actLeft.offsetWidth;
    s.el.style.transform=`translateX(${Math.min(aw,Math.max(0,raw))}px)`;
  }else{
    const aw=s.actRight.offsetWidth;
    s.el.style.transform=`translateX(${Math.max(-aw,Math.min(0,raw))}px)`;
  }
}
function swEnd(e){
  const s=_sw.state;_sw.state=null;
  if(!s||!s.started)return;
  _sw.moved=true;setTimeout(()=>{_sw.moved=false;},300);
  const {x}=_swGetEndXY(e);
  const dx=x-s.startX+s.initOffset;
  s.el.style.transition='transform .2s ease';
  if(s.dir==='right'){
    const aw=s.actLeft.offsetWidth;
    if(dx>(aw*0.3)){s.el.style.transform=`translateX(${aw}px)`;_sw.openId=s.id;_sw.openDir='right';}
    else{s.el.style.transform='translateX(0)';_sw.openId=null;_sw.openDir=null;}
  }else{
    const aw=s.actRight.offsetWidth;
    if(dx<-(aw*0.3)){s.el.style.transform=`translateX(-${aw}px)`;_sw.openId=s.id;_sw.openDir='left';}
    else{s.el.style.transform='translateX(0)';_sw.openId=null;_sw.openDir=null;}
  }
}

async function _gFetch(url,opts={}){
  if(location.protocol==='file:')throw new Error('file://では外部APIにアクセスできません。HTTPSで配信してください');
  const pat=gPat();
  let res;
  try{
    res=await fetch(url,{...opts,cache:'no-store',headers:{'Content-Type':'application/json',...(pat?{'Authorization':'token '+pat}:{}),...(opts.headers||{})}});
  }catch(fe){
    throw new Error('ネットワークエラー（GitHubへ到達できません）: '+fe.message+' — インターネット接続・VPN・ファイアウォールをご確認ください');
  }
  if(!res.ok){let msg='HTTP '+res.status;try{const e=await res.clone().json();if(e.message)msg=e.message;}catch(x){}throw new Error(msg);}
  return res.json();
}
async function _gistDoPull(){
  const pat=gPat(),id=gId();
  if(!pat||!id)throw new Error('Token/ID未設定');
  const data=await _gFetch('https://api.github.com/gists/'+id+'?_t='+Date.now());
  // getC: fetch file content; truncated→try raw_url without auth (avoids CORS preflight on gist.githubusercontent.com), then with auth
  const getC=async fi=>{
    if(!fi.truncated)return fi.content||null;
    try{const r=await fetch(fi.raw_url);if(r.ok)return await r.text();}catch(e){}
    try{return await fetch(fi.raw_url,{headers:{'Authorization':'token '+pat}}).then(r=>r.text());}
    catch(fe){
      console.warn('raw fetch failed (file >1MB, raw_url blocked):',fi.raw_url,fe.message);
      return null;  // fi.content is truncated partial JSON — do NOT parse it
    }
  };
  _gistPulling=true;
  let _skipped=[];
  try{
    let _listFromFile=false;
    if(data.files['list.json']){
      const c=await getC(data.files['list.json']);
      if(c){saveList(JSON.parse(c));_listFromFile=true;}
      else _skipped.push('list');
    }
    const _invLoaded={};
    for(const fn of Object.keys(data.files)){
      if(fn.startsWith('inv_')&&fn.endsWith('.json')){
        const c=await getC(data.files[fn]);
        if(c){const iid=fn.slice(4,-5);localStorage.setItem('mykita_dc_inv_'+iid,c);_invLoaded[iid]=c;}
        else _skipped.push(fn);
      }
    }
    // If list.json was unavailable (>1MB), rebuild list from inv_ files
    if(!_listFromFile&&Object.keys(_invLoaded).length>0){
      const localList=loadList();
      const localById={};localList.forEach(e=>localById[e.id]=e);
      const seen=new Set();const newList=[];
      for(const e of localList){
        if(_invLoaded[e.id]){
          const inv=JSON.parse(_invLoaded[e.id]);
          const defItems=inv.items.filter(i=>i.status==='defective');
          newList.push({id:e.id,number:inv.number||e.number,date:inv.date||e.date,createdAt:e.createdAt,archived:e.archived,tot:inv.items.length,pend:inv.items.filter(i=>i.status==='pending').length,dispTotal:defItems.length,dispSet:defItems.filter(i=>i.disp).length,receCount:defItems.filter(i=>i.receiving).length,updatedAt:e.updatedAt});
        }else{newList.push(e);}
        seen.add(e.id);
      }
      for(const[iid,c]of Object.entries(_invLoaded)){
        if(!seen.has(iid)){
          const inv=JSON.parse(c);
          const defItems=inv.items.filter(i=>i.status==='defective');
          newList.unshift({id:iid,number:inv.number||'',date:inv.date||'',createdAt:inv.createdAt||new Date().toISOString(),archived:false,tot:inv.items.length,pend:inv.items.filter(i=>i.status==='pending').length,dispTotal:defItems.length,dispSet:defItems.filter(i=>i.disp).length,receCount:defItems.filter(i=>i.receiving).length});
        }
      }
      saveList(newList);
      _skipped=_skipped.filter(s=>s!=='list');
    }
    // Repo設定を他デバイスへ自動反映・写真同期（エラーがあってもインボイス表示をブロックしない）
    try{
      if(data.files['settings.json']){
        const c=await getC(data.files['settings.json']);
        if(c){try{const st=JSON.parse(c);if(st.repo&&!gRepo())localStorage.setItem(GK_REPO,st.repo);}catch(e){}}
      }
      if(data.files['photo_index.json']){
        const c=await getC(data.files['photo_index.json']);
        if(c){
          const idx=JSON.parse(c);_photoIdx=idx;
          if(gRepo()){
            const repo=gRepo();
            const needed=new Set();
            for(const fn of Object.keys(_invLoaded)){
              try{const inv=JSON.parse(_invLoaded[fn]);inv.items.forEach(it=>{(it.photos||[]).concat(it.origPhotos||[]).forEach(k=>{if(k&&!k.startsWith('data:'))needed.add(k);});});}catch(e){}
            }
            (async()=>{
              for(const key of needed){
                if(!_pc[key]&&idx[key]){
                  try{const url=await _ghDownloadAsset(repo,idx[key]);idbPut(key,url);_schedulePhotoRender();}
                  catch(e){console.warn('Photo download failed:',key,e.message);}
                }
              }
            })();
          }
        }else _skipped.push('photos');
      }else if(data.files['photos.json']){
        const c=await getC(data.files['photos.json']);
        if(c){const ph=JSON.parse(c);for(const[k,v]of Object.entries(ph))idbPut(k,v);}
        else _skipped.push('photos');
      }
    }catch(pe){console.warn('Photo sync error (non-fatal):',pe);}
    _markClean();
  }finally{
    _gistPulling=false;
  }
  localStorage.setItem(GK_AT,new Date().toISOString());
  if(S.invoiceId){const d=localStorage.getItem('mykita_dc_inv_'+S.invoiceId);if(d){const inv=JSON.parse(d);inv.items=inv.items.map(migrateItem);S.invoice=inv;}}
  const _loadedInvs=Object.keys(data.files).filter(fn=>fn.startsWith('inv_')&&fn.endsWith('.json')&&!_skipped.includes(fn)).length;
  const _diagParts=['Gist: '+id.slice(0,8)+'…','ファイル: '+Object.keys(data.files).length+'個','インボイス: '+_loadedInvs+'件'];
  if(_skipped.length)_diagParts.push('スキップ: '+_skipped.join(', '));
  _syncMsg='Pull完了 ('+_diagParts.join(' / ')+')';
}
async function gistPush(){
  if(!gPat()){alert('GitHub Personal Access Tokenを設定してください');return;}
  S.pushing=true;_syncSt='push';_syncMsg='';render();
  try{
    const list=loadList();
    const gistId=gId();
    // Step1: インボイスファイルを構築（写真データを除外）
    const invFiles={};
    const _stripDataUrls=arr=>(arr||[]).filter(p=>p&&!p.startsWith('data:'));
    list.forEach(e=>{const d=localStorage.getItem('mykita_dc_inv_'+e.id);if(d){try{const inv=JSON.parse(d);const clean={...inv,items:inv.items.map(it=>({...it,photos:_stripDataUrls(it.photos),origPhotos:_stripDataUrls(it.origPhotos)}))};invFiles['inv_'+e.id+'.json']={content:JSON.stringify(clean)};}catch(x){invFiles['inv_'+e.id+'.json']={content:d};}}});
    // Step2: リマートのlist.jsonと合算（他デバイスのインボイスを消さない）—失敗しても続行
    let mergedList=[...list];
    let _cur=null;
    if(gistId){
      try{
        _cur=await _gFetch('https://api.github.com/gists/'+gistId+'?_t='+Date.now());
        const lf=_cur.files['list.json'];
        if(lf){
          const rc=lf.truncated?await fetch(lf.raw_url,{headers:{'Authorization':'token '+gPat()}}).then(r=>r.text()):lf.content;
          if(rc){const remoteList=JSON.parse(rc);const localIds=new Set(list.map(e=>e.id));for(const e of remoteList){if(!localIds.has(e.id))mergedList.push(e);}}
        }
      }catch(fetchErr){console.warn('Gist fetch for merge skipped:',fetchErr.message);}
    }
    invFiles['list.json']={content:JSON.stringify(mergedList)};
    // Step3: インボイスデータのみGist PATCH（写真は一切含まない）
    let data;
    if(gistId){
      data=await _gFetch('https://api.github.com/gists/'+gistId,{method:'PATCH',body:JSON.stringify({files:invFiles})});
    }else{
      data=await _gFetch('https://api.github.com/gists',{method:'POST',body:JSON.stringify({description:'MYKITA Osaka DC',public:false,files:invFiles})});
      localStorage.setItem(GK_ID,data.id);
    }
    localStorage.setItem(GK_AT,new Date().toISOString());
    _markClean();_syncSt='ok';
    const finalId=gistId||data.id;
    const pushedInvCount=Object.keys(invFiles).filter(k=>k.startsWith('inv_')).length;
    _syncMsg='Push完了 (Gist: '+(finalId?finalId.slice(0,8)+'…':'new')+' / リスト: '+mergedList.length+'件 / invファイル: '+pushedInvCount+'個)';
    alert(_syncMsg);
    // Step4: 写真同期は完全に分離して非同期実行（インボイス同期とは独立）
    _pushPhotosSilent(finalId,_cur).catch(e=>console.warn('Photo sync (bg) failed:',e.message));
  }catch(e){_syncSt='err';_syncMsg='Push失敗: '+e.message;alert('Push失敗: '+e.message);}
  S.pushing=false;render();setTimeout(()=>{if(_syncSt==='ok'){_syncSt=null;render();}},3000);
}
async function _pushPhotosSilent(gistId,cur){
  const photoFiles={};
  if(gRepo()){
    await _pushPhotosToRelease(gRepo(),cur,photoFiles);
    photoFiles['settings.json']={content:JSON.stringify({repo:gRepo()})};
  }else{
    const photos={};Object.keys(_pc).forEach(k=>{photos[k]=_pc[k];});
    if(!Object.keys(photos).length)return;

  }

    await _gFetch('https://api.github.com/gists/'+gistId,{method:'PATCH',body:JSON.stringify({files:photoFiles})});
}

/* ── GitHub Releases photo helpers ── */
function _dataURLtoBlob(d){const[h,b]=d.split(',');const m=h.match(/:(.*?);/)[1];const s=atob(b);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return new Blob([a],{type:m});}
let _ghRelId=null;
async function _ghGetOrCreateRelease(repo){
  if(_ghRelId)return _ghRelId;
  const rels=await _gFetch('https://api.github.com/repos/'+repo+'/releases');
  const rel=rels.find(r=>r.tag_name==='photos');
  if(rel){_ghRelId=rel.id;return rel.id;}
  const created=await _gFetch('https://api.github.com/repos/'+repo+'/releases',{method:'POST',body:JSON.stringify({tag_name:'photos',name:'Photo Storage',body:'MYKITA DC photo storage',draft:false,prerelease:true})});
  _ghRelId=created.id;return created.id;
}
async function _ghUploadAsset(repo,releaseId,name,blob){
  const pat=gPat();let res;
  try{res=await fetch('https://uploads.github.com/repos/'+repo+'/releases/'+releaseId+'/assets?name='+encodeURIComponent(name)+'.jpg',{method:'POST',headers:{'Authorization':'token '+pat,'Content-Type':'image/jpeg'},body:blob});}
  catch(fe){throw new Error('写真アップロード失敗: '+fe.message);}
  if(!res.ok){let m='HTTP '+res.status;try{const e=await res.clone().json();if(e.message)m=e.message;}catch(x){}throw new Error('写真アップロード失敗: '+m);}
  return (await res.json()).id;
}
async function _ghDownloadAsset(repo,assetId){
  const pat=gPat();let res;
  try{res=await fetch('https://api.github.com/repos/'+repo+'/releases/assets/'+assetId,{headers:{'Authorization':'token '+pat,'Accept':'application/octet-stream'}});}
  catch(fe){throw new Error('写真ダウンロード失敗: '+fe.message);}
  if(!res.ok)throw new Error('写真ダウンロード失敗: HTTP '+res.status);
  const blob=await res.blob();
  return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(blob);});
}
async function _ghDeleteAsset(repo,assetId){
  const pat=gPat();
  try{await fetch('https://api.github.com/repos/'+repo+'/releases/assets/'+assetId,{method:'DELETE',headers:{'Authorization':'token '+pat}});}
  catch(e){console.warn('asset delete failed:',e);}
}
function _deletePhoto(key){
  idbDel(key);
  if(gRepo()&&_photoIdx&&_photoIdx[key]){
    _ghDeleteAsset(gRepo(),_photoIdx[key]).catch(()=>{});
    delete _photoIdx[key];
  }
}
async function _pushPhotosToRelease(repo,cur,files){
  let existingIdx=_photoIdx||{};
  if(!_photoIdx&&cur&&cur.files['photo_index.json']&&!cur.files['photo_index.json'].truncated){
    try{existingIdx=JSON.parse(cur.files['photo_index.json'].content||'{}');}catch(e){}
  }
  const relId=await _ghGetOrCreateRelease(repo);
  const newIdx={...existingIdx};
  for(const[key,dataURL]of Object.entries(_pc)){
    if(!existingIdx[key]){
      try{newIdx[key]=await _ghUploadAsset(repo,relId,key,_dataURLtoBlob(dataURL));}
      catch(e){console.warn('Photo upload skipped:',key,e.message);}
    }
  }
  for(const key of Object.keys(existingIdx)){
    if(!_pc[key]){_ghDeleteAsset(repo,existingIdx[key]).catch(()=>{});delete newIdx[key];}
  }
  _photoIdx=newIdx;
  files['photo_index.json']={content:JSON.stringify(newIdx)};
}

/* ── IndexedDB photo store ── */
const _pc={};          // in-memory photo cache {key→dataURL}
let _photoIdx=null;    // {photoKey→releaseAssetId} loaded from photo_index.json
let _idb=null;
function _openIdb(){
  if(_idb)return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('osaka_dc_photos',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('p');
    r.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    r.onerror=e=>rej(e.target.error);
  });
}
function idbPut(key,val){_pc[key]=val;_openIdb().then(db=>{const tx=db.transaction('p','readwrite');tx.objectStore('p').put(val,key);});}
function idbDel(key){delete _pc[key];_openIdb().then(db=>{const tx=db.transaction('p','readwrite');tx.objectStore('p').delete(key);});}
function idbLoadAll(){
  return _openIdb().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction('p','readonly');
    const r=tx.objectStore('p').openCursor();
    r.onsuccess=e=>{const c=e.target.result;if(c){_pc[c.key]=c.value;c.continue();}else res();};
    r.onerror=e=>rej(e.target.error);
  }));
}
function photoKey(){return 'pk_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function idbGet(key){return _openIdb().then(db=>new Promise((res,rej)=>{const tx=db.transaction('p','readonly');const r=tx.objectStore('p').get(key);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);}));}
async function resolvePhotoAsync(key){if(!key)return null;if(key.startsWith('data:'))return key;if(_pc[key])return _pc[key];const v=await idbGet(key).catch(()=>null);if(v)_pc[key]=v;return v||null;}

/* PDF EXTRACTION */
async function handleReparseByNumber(f){
  if(!f)return;
  try{
    const buf=await f.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      const rows={};
      ct.items.forEach(item=>{const y=Math.round(item.transform[5]);if(!rows[y])rows[y]=[];rows[y].push({x:item.transform[4],t:item.str});});
      Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{const line=rows[y].sort((a,b)=>a.x-b.x).map(i=>i.t).join(' ').trim();if(line)text+=line+'\n';});
    }
    const newInv=parseMykita(text);
    if(!newInv||!newInv.items.length){alert('PDFを解析できませんでした。\n正しいMYKITA Proforma Invoice PDFか確認してください。');return;}
    // Find matching invoice by number
    const list=loadList();
    const match=list.find(e=>e.number===newInv.number);
    if(!match){alert('インボイス番号 "'+newInv.number+'" に一致するインボイスが見つかりません。');return;}
    const d=localStorage.getItem('mykita_dc_inv_'+match.id);
    if(!d){alert('インボイスデータが見つかりません');return;}
    const existing=JSON.parse(d);
    // Merge: update parsed fields, preserve user-entered data
    const KEEP=['status','remark','defects','stampNo','photos','origPhotos','pn','disp','receiving','receivingDate','smDone'];
    const existingByNo={};existing.items.forEach(it=>existingByNo[it.no]=it);
    const newByNo={};newInv.items.forEach(it=>newByNo[it.no]=it);
    const merged=newInv.items.map(nit=>{
      const ex=existingByNo[nit.no];if(!ex)return nit;
      const out={...nit};KEEP.forEach(k=>{if(k in ex)out[k]=ex[k];});return out;
    });
    existing.items.forEach(ex=>{if(!newByNo[ex.no])merged.push(ex);});
    const mergedInv={...newInv,items:merged};
    localStorage.setItem('mykita_dc_inv_'+match.id,JSON.stringify(mergedInv));
    const idx=list.findIndex(e=>e.id===match.id);
    if(idx>=0){
      const defs=merged.filter(i=>i.status==='defective');
      list[idx].tot=merged.length;list[idx].pend=merged.filter(i=>i.status==='pending').length;
      list[idx].number=mergedInv.number||list[idx].number;
      list[idx].dispTotal=defs.length;list[idx].dispSet=defs.filter(i=>i.disp).length;
      list[idx].receCount=defs.filter(i=>i.receiving).length;
      saveList(list);
    }
    _invsDirty=true;{const _ld=_listSnap!==null&&_listForSnap(loadList())!==_listSnap;_dirty=_ld||_invsDirty||!!_dispDirtyIds.size;}
    alert('再解析完了: '+newInv.number+'\n'+merged.length+'件のアイテムを更新しました\n\n変更を保存するにはPushしてください');
    render();
  }catch(e){alert('PDF読込エラー: '+e.message);}
}
async function handleFile(f){
  if(!f)return;
  S.loading=true;S.rawText='';S.parseErr='';render();
  try{
    const buf=await f.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);

      const rows={};
      ct.items.forEach(item=>{
        const y=Math.round(item.transform[5]);
        if(!rows[y])rows[y]=[];
        rows[y].push({x:item.transform[4],t:item.str});
      });
      Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
        const line=rows[y].sort((a,b)=>a.x-b.x).map(i=>i.t).join(' ').trim();
        if(line)text+=line+'\n';
      });

}

/* MYKITA PROFORMA INVOICE PARSER
   Columns: Position Qty Unit Item# Description [ColorCode] CustRef Order# Delivery# [SUN/RX] [Material] HS-Code DE UnitPrice TotalPrice JPY */
function parseMykita(text){
  // Invoice number: "Proforma Invoice 5000003270" or "Invoice No. 5000003270"
  let number='';
  const nm=text.match(/(?:Proforma\s+Invoice|Invoice\s+No\.?)\s+(\d{7,12})/i);
  if(nm)number=nm[1];

  // Date: "Date 30.03.2026"
  let date='';
  const dm=text.match(/\bDate\s+(\d{1,2}\.\d{1,2}\.\d{4})/i);
  if(dm)date=dm[1];

  // Item lines: anchor on Delivery# (8-digit, e.g. 81299521) then HS-Code (8-digit), DE, prices, JPY
  // Columns: Position Qty Unit Item# [Description Color CustomerRef OrderNo] Delivery# [SUN/RX] [Material] HS-Code DE UnitPrice TotalPrice JPY
  const re=/^[ \t]*(\d{1,2})[ \t]+(\d+)[ \t]+(PC|PA)[ \t]+(\d{8})[ \t]+(.+?)[ \t]+(\d{8})[ \t]+(SUN[ \t]+|RX[ \t]+)?(?:metal[ \t]+|acetate[ \t]+|MYLON[ \t]+|plastic[ \t]+)?(\d{8})[ \t]+DE[ \t]+(\d+)[ \t]+\d+[ \t]+JPY/gm;
  // Pre-extract orphan model names: lines that contain only a MYKITA model name (separated from row data by pdfjs)
  const _orphans=[];
  {const _or=/^[ \t]*([A-Z]{2,}(?:\s+[A-Z0-9]+)?(?:[\-\/][A-Z0-9\/\-_]+)+_(?:RX|SUN)(?:\*)?)\s*$/gm;let _om;while((_om=_or.exec(text))!==null)_orphans.push({index:_om.index,name:_om[1].trim()});}
  const items=[];
  let m;
  while((m=re.exec(text))!==null){
    const pos=m[1],qty=m[2],unit=m[3],itemNo=m[4];
    let descRaw=m[5].trim();
    // If descRaw starts with a digit, model name may be an orphan line nearby in the text
    if(/^\d/.test(descRaw)&&_orphans.length){
      const nearest=_orphans.reduce((b,o)=>{const d=Math.abs(o.index-m.index);return d<b.dist?{name:o.name,dist:d}:b;},{name:null,dist:Infinity});
      if(nearest.name&&nearest.dist<500)descRaw=nearest.name+' '+descRaw;
    }
    // m[6]=delivery#, m[7]=SUN/RX column (undefined if blank), m[8]=HS-Code, m[9]=unitPrice (not stored)
    const sunRxCol=(m[7]||'').trim().toUpperCase();
    const hsCode=m[8],unitPrice='';
    // Category: HS code takes priority, then RX/SUN column; blank column → PARTS
    let cat;
    if(hsCode==='90039000')cat='parts';
    else if(hsCode==='90041091')cat='sun';
    else if(sunRxCol.startsWith('SUN'))cat='sun';
    else if(sunRxCol.startsWith('RX'))cat='rx';
    else cat='parts';  // RX/SUN列が空欄 → PARTS
    // Extract color code for non-parts items
    let name=descRaw,colorCode='';
    if(cat!=='parts'){
      // 1st priority: explicit "Color NNN" label from PDF
      const clm=descRaw.match(/\bColor\s+(\d{3})\b/i);
      if(clm){
        colorCode=clm[1];
        name=descRaw.replace(clm[0],'').replace(/\s{2,}/g,' ').trim();
      } else {
        // 2nd priority: C-prefixed code e.g. "C234"
        const cpm=descRaw.match(/\bC(\d{3})\b/);
        if(cpm){
          colorCode=cpm[1];
          name=descRaw.replace(cpm[0],'').replace(/\s{2,}/g,' ').trim();
        } else {
          // 3rd priority: leading 3-digit color code e.g. "556 Ms Giye 255644"
          const cld=descRaw.match(/^(\d{3})\s+([A-Za-z].*)$/);
          if(cld){
            colorCode=cld[1];
            name=cld[2].trim();
          } else {
            // Fallback: standalone 3-digit number at end of description
            const cm=descRaw.match(/^(.*?)\s+(\d{3})(?:\s+.*)?$/);
            if(cm&&!/^\d/.test(cm[1].trim())){name=cm[1].trim();colorCode=cm[2]}
          }
        }
      }
    } else {
      // For parts: strip everything from customer-reference keywords onward
      name=descRaw.replace(/\s+(def |wrong |NURIA |Shop |Personal |C\d{3}\s*\/|\/\s*).*/i,'').trim();
    }
    // Extract orderNo (6-7 digit standalone number) and custRef from descRaw
    let orderNo='',custRef='';
    {const onm=descRaw.match(/\b(\d{6,7})\b/);
     if(onm){orderNo=onm[1];
       let rem=descRaw.replace(orderNo,'');
       if(name)rem=rem.replace(name,'');
       if(colorCode){rem=rem.replace(new RegExp('(?:Color\\s+)?'+colorCode,'gi'),'').replace('C'+colorCode,'');}
       custRef=rem.replace(/[^a-zA-Z0-9\s]/g,'').replace(/\s{2,}/g,' ').trim().toLowerCase();
     }
    }
    // Strip orderNo from name if it leaked in during color extraction
    if(orderNo&&name.includes(orderNo)){name=name.replace(new RegExp('\\b'+orderNo+'\\b'),'').replace(/\s{2,}/g,' ').trim();}
    const qtyN=parseInt(qty)||1;
    if(qtyN<=1){
      items.push({no:pos,qty:'1',unit,itemNo,name,colorCode,cat,unitPrice,orderNo,custRef,status:'pending',remark:'',subOf:null,subIdx:0,subTotal:1,defects:[newDefect()],stampNo:'',photos:[]});
    } else {
      for(let si=1;si<=qtyN;si++){
        items.push({no:pos+'-'+si,qty:'1',unit,itemNo,name,colorCode,cat,unitPrice,orderNo,custRef,status:'pending',remark:'',subOf:pos,subIdx:si,subTotal:qtyN,defects:[newDefect()],stampNo:'',photos:[]});
      }
    }
  }
  return{number,date,items};
}

function cycle(no){
  if(checkArchived())return;
  S.invoice.items=S.invoice.items.map(it=>{
    if(it.no!==no)return it;
    const prev=it.status;
    const i=CYCLE_STATS.indexOf(prev);
    const next=CYCLE_STATS[(i<0?0:i+1)%CYCLE_STATS.length];
    if(next==='defective'){
      S.pickerOpen[no]=true;
    }else if(prev==='defective'){
      delete S.pickerOpen[no];
      const cleaned=it.defects.filter((d,idx)=>
        idx===0||d.part||d.partOther||d.side||d.cond.length||d.condOther
      );
      it=syncRemark({...it,defects:cleaned.length?cleaned:[it.defects[0]]});
    }
    return{...it,status:next};
  });
  save();render();
}

// idx = index within defects array
function updDefect(no,idx,fn){
  S.invoice.items=S.invoice.items.map(it=>{
    if(it.no!==no)return it;
    const defects=it.defects.map((d,i)=>i===idx?fn(d):d);
    return syncRemark({...it,defects});
  });
  save();render();
}
function toggleDefPart(no,idx,val){
  updDefect(no,idx,d=>{
    const newPart=d.part===val?'':val;
    const valid=DEF_COND_MAP[newPart]||DEF_COND_MAP[''];
    const partDetail=newPart==='Front Parts'?d.partDetail:null;
    return {...d,part:newPart,partDetail,cond:d.cond.filter(c=>valid.includes(c))};

function syncRemark(it){
  const parts=it.defects.map(d=>{
    const partStr=d.part||(d.partOther||'');
    const detail=d.partDetail?` (${d.partDetail})`:'';
    const partDisplay=partStr+detail;
    const loc=partStr
      ?(d.side==='Both'&&partStr==='Lens'&&!d.partDetail?'Both lenses':
        d.side==='Both'&&partStr==='Temple'?'Both temples':
        d.side?d.side+' '+partDisplay.toLowerCase():partDisplay)
      :(d.side||'');
    const conds=[...d.cond,...(d.condOther?[d.condOther]:[])].map(c=>c==='Scratch'?'Scratches':c);
    return[loc,conds.join(', ')].filter(Boolean).join(' / ');
  }).filter(Boolean);
  return{...it,remark:parts.join(' | ')};
}

const MK_MS_CLIENT='mykita_ms_client_id';
const MK_MS_TENANT='mykita_ms_tenant_id';
let _msalApp=null,_msalAccount=null,_settingsShowMs=false,_settingsShowHelp=false,_settingsShowCsvFields=false,_settingsShowReparse=false;
let _guideOpen=false,_guideStep=0;
let _msalInitPromise=null;
function getMsClientId(){return localStorage.getItem(MK_MS_CLIENT)||'';}
function getMsTenantId(){return localStorage.getItem(MK_MS_TENANT)||'common';}
async function _initMsal(){
  // Singleton: reuse in-flight promise to avoid duplicate MSAL instances
  if(_msalInitPromise)return _msalInitPromise;
  _msalInitPromise=(async()=>{
    const clientId=getMsClientId();
    if(!clientId)return {ok:false,err:'Client IDが未設定です'};
    if(typeof msal==='undefined')return {ok:false,err:'MSALライブラリの読み込みに失敗しました。ネットワーク接続を確認してください'};
    try{
      const app=new msal.PublicClientApplication({
        auth:{clientId,authority:'https://login.microsoftonline.com/'+getMsTenantId(),redirectUri:location.origin+location.pathname},
        cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}
      });
      if(typeof app.initialize==='function')await app.initialize();
      _msalApp=app;
      const accs=_msalApp.getAllAccounts();
      if(accs.length)_msalAccount=accs[0];
      return {ok:true};
    }catch(e){console.error('MSAL init:',e);_msalInitPromise=null;return {ok:false,err:e.message||String(e)};}
  })();
  return _msalInitPromise;
}
async function msSignIn(){
  if(!getMsClientId()){alert('Client IDを設定してください（SET → Microsoft）');return;}
  // Wait for any in-flight init (started by initApp) before proceeding
  const initResult=await _initMsal();
  if(!initResult.ok){alert('MSALの初期化に失敗しました\n'+initResult.err);return;}
  // Preserve email modal state across the async popup (popup may take time)
  const _prevShowEmail=S.showEmail;
  const _prevInvoiceId=S.invoiceId;
  const _prevInvoice=S.invoice;
  try{
    const r=await _msalApp.loginPopup({scopes:['Mail.Send','User.Read'],prompt:'select_account'});
    _msalAccount=r.account||(_msalApp.getAllAccounts()[0]||null);
    // Restore email modal if it was open when sign-in was triggered
    if(_prevShowEmail&&_prevInvoice){
      S.showEmail=true;
      S.invoiceId=_prevInvoiceId;
      S.invoice=_prevInvoice;
    }
    render();
  }catch(e){if(e.errorCode!=='user_cancelled')alert('サインインエラー: '+(e.message||e.errorCode||e));}
}
async function msSignOut(){
  if(!_msalApp||!_msalAccount)return;
  try{await _msalApp.logoutPopup({account:_msalAccount});}catch(e){}
  _msalAccount=null;render();
}
async function _getMsToken(){
  if(!_msalApp||!_msalAccount)throw new Error('Microsoftにサインインしてください');
  try{
    const r=await _msalApp.acquireTokenSilent({scopes:['Mail.Send'],account:_msalAccount});
    return r.accessToken;
  }catch(e){
    const r=await _msalApp.acquireTokenPopup({scopes:['Mail.Send'],account:_msalAccount});
    return r.accessToken;
  }
}
async function sendViaGraph(){
  const btn=g('ms-send-btn');
  if(btn){btn.textContent='送信中…';btn.disabled=true;}
  try{
    const token=await _getMsToken();
    const subj=g('em-s')?.value||S.emailSubj;
    const body=g('em-b')?.value||S.emailBody;
    const to=g('em-t')?.value||S.emailTo;
    const sel=(S.emailPhotoKeys||[]).filter(p=>S.emailSelKeys&&S.emailSelKeys.has(p.key));
    const attachments=[];
    for(let i=0;i<sel.length;i++){
      const p=sel[i];
      const src=await resolvePhotoAsync(p.key);
      if(!src)continue;
      const comma=src.indexOf(',');
      const mime=(src.slice(0,comma).match(/:(.*?);/)||[])[1]||'image/jpeg';
      const ext=mime.includes('png')?'png':'jpg';
      const fname=`${p.pos}.${(p.name||'').replace(/[^\w-]/g,'_').slice(0,20)}_${i+1}.${ext}`;
      attachments.push({'@odata.type':'#microsoft.graph.fileAttachment',name:fname,contentType:mime,contentBytes:src.slice(comma+1)});
    }
    const message={subject:subj,body:{contentType:'Text',content:body},toRecipients:[{emailAddress:{address:to}}]};
    if(attachments.length)message.attachments=attachments;
    const res=await fetch('https://graph.microsoft.com/v1.0/me/sendMail',{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({message,saveToSentItems:true})
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||res.statusText);}
    alert('送信しました');
    S.showEmail=false;render();
  }catch(e){
    if(e.name!=='AbortError')alert('送信エラー: '+e.message);
    if(btn){btn.textContent='SEND';btn.disabled=false;}
  }
}

async function downloadAttachments(){
  const sel=(S.emailPhotoKeys||[]).filter(p=>S.emailSelKeys&&S.emailSelKeys.has(p.key));
  if(!sel.length){alert('写真が選択されていません');return;}
  const btn=g('dl-att-btn');
  if(btn){btn.textContent='保存中…';btn.disabled=true;}
  try{
    for(let i=0;i<sel.length;i++){
      const p=sel[i];
      const src=await resolvePhotoAsync(p.key);
      if(!src)continue;
      const comma=src.indexOf(',');
      const mime=(src.slice(0,comma).match(/:(.*?);/)||[])[1]||'image/jpeg';
      const ext=mime.includes('png')?'png':'jpg';
      const fname=`${p.pos}.${(p.name||'').replace(/[^\w-]/g,'_').slice(0,20)}_${i+1}.${ext}`;
      const a=document.createElement('a');
      a.href=src;a.download=fname;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);
      await new Promise(r=>setTimeout(r,300));
    }
  }finally{
    if(btn){btn.textContent='添付画像を保存';btn.disabled=false;}
  }
}

async function handlePhoto(no, file){
  if(!file)return;
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const MAX=800;
    let w=img.width,h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    const origB64=canvas.toDataURL('image/jpeg',0.65);
    // Burn auto-label onto image
    const _it=S.invoice.items.find(i=>i.no===no);
    const label=_it?((_it.subOf||_it.no)+'.'+(_it.name||'')):'';
    if(label){
      const fs=Math.max(28,Math.round(w/22))+2;
      const pad=Math.round(w*0.025);
      ctx.font='bold '+fs+'px Montserrat,Arial,sans-serif';
      const olw=Math.max(3,Math.round(fs*0.12));
      ctx.lineWidth=olw; ctx.lineJoin='round'; ctx.strokeStyle='white';
      ctx.strokeText(label, pad+10, pad+fs+25);
      ctx.fillStyle='#e53935';
      ctx.fillText(label, pad+10, pad+fs+25);
    }
    const burnedB64=canvas.toDataURL('image/jpeg',0.65);
    const bKey=photoKey(), oKey=photoKey();
    idbPut(bKey,burnedB64); idbPut(oKey,origB64);
    S.invoice.items=S.invoice.items.map(it=>{
      if(it.no!==no)return it;
      const photos=[...(it.photos||[])];
      const origPhotos=[...(it.origPhotos||[])];
      photos.push(bKey);
      origPhotos.push(oKey);
      return{...it,photos,origPhotos};
    });
    save(); render();
  };
  img.src=url;
}

/* MARKUP EDITOR */
let MU={canvas:null,ctx:null,img:null,drawing:false,startX:0,startY:0,scale:1,offX:0,offY:0};

function initMarkupCanvas(){
  const canvas=document.getElementById('mu-canvas');
  if(!canvas||!S.markup)return;
  MU.canvas=canvas;
  MU.ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    MU.img=img;
    const wrap=canvas.parentElement;
    const scale=Math.min(wrap.clientWidth/img.width, wrap.clientHeight/img.height, 1);
    canvas.width=img.width; canvas.height=img.height;
    canvas.style.width=Math.round(img.width*scale)+'px';
    canvas.style.height=Math.round(img.height*scale)+'px';
    MU.scale=scale;
    drawMarkup();
  };
  img.src=S.markup.src;
  canvas.addEventListener('touchstart',muTouchStart,{passive:false});
  canvas.addEventListener('touchmove',muTouchMove,{passive:false});
  canvas.addEventListener('touchend',muTouchEnd,{passive:false});
  canvas.addEventListener('mousedown',e=>muTouchStart({touches:[{clientX:e.clientX,clientY:e.clientY}],preventDefault:()=>{}}));
  canvas.addEventListener('mousemove',e=>{if(MU.drawing||S.markup.dragStart)muTouchMove({touches:[{clientX:e.clientX,clientY:e.clientY}],preventDefault:()=>{}})});
  canvas.addEventListener('mouseup',e=>muTouchEnd({changedTouches:[{clientX:e.clientX,clientY:e.clientY}]}));
}

function muCoord(touch){
  const rect=MU.canvas.getBoundingClientRect();
  return{x:(touch.clientX-rect.left)/MU.scale, y:(touch.clientY-rect.top)/MU.scale};
}

function muHitTest(x,y){
  const ann=S.markup.annotations;
  const fs=Math.max(36,Math.round((MU.img?MU.img.width:1000)*0.045));
  for(let i=ann.length-1;i>=0;i--){
    const a=ann[i];
    if(a.type==='circle'){
      const dist=Math.sqrt((x-a.cx)**2+(y-a.cy)**2);
      if(Math.abs(dist-a.r)<Math.max(24,a.r*0.18)||dist<a.r*0.3) return i;
    } else if(a.type==='text'){
      const tw=a.text.length*fs*0.55;
      if(x>=a.x-10&&x<=a.x+tw&&y>=a.y-fs&&y<=a.y+12) return i;
    }
  }
  return -1;
}

function muTouchStart(e){
  e.preventDefault();
  const {x,y}=muCoord(e.touches[0]);
  if(S.markup.tool==='text'){
    S.markup.textInput={x,y,text:S.markup.autoLabel||''};
    S.markup.selectedIdx=null;
    render();
    requestAnimationFrame(()=>{const inp=document.getElementById('mu-text-inp');if(inp){inp.focus();inp.select();}});
    return;
  }
  if(S.markup.tool==='select'){
    const hit=muHitTest(x,y);
    S.markup.selectedIdx=hit>=0?hit:null;
    if(hit>=0) S.markup.dragStart={x,y};
    else S.markup.dragStart=null;
    drawMarkup();
    render();
    requestAnimationFrame(initMarkupCanvas);
    return;
  }
  MU.drawing=true; MU.startX=x; MU.startY=y;
}
function muTouchMove(e){
  e.preventDefault();
  const {x,y}=muCoord(e.touches[0]);
  if(S.markup.tool==='select'&&S.markup.dragStart!==null&&S.markup.selectedIdx!==null){
    const dx=x-S.markup.dragStart.x, dy=y-S.markup.dragStart.y;
    const a=S.markup.annotations[S.markup.selectedIdx];
    if(a){
      if(a.type==='circle'){a.cx+=dx;a.cy+=dy;}
      else if(a.type==='text'){a.x+=dx;a.y+=dy;}
    }
    S.markup.dragStart={x,y};
    drawMarkup();
    return;
  }
  if(!MU.drawing)return;
  drawMarkup({preview:{x,y}});
}
function muTouchEnd(e){
  S.markup.dragStart=null;
  if(!MU.drawing)return;
  MU.drawing=false;
  const {x,y}=muCoord(e.changedTouches[0]);
  const dx=x-MU.startX,dy=y-MU.startY;
  const r=Math.sqrt(dx*dx+dy*dy);
  if(r>10) S.markup.annotations.push({type:'circle',cx:MU.startX,cy:MU.startY,r});
  drawMarkup();
}

function drawMarkup(opts){
  const ctx=MU.ctx;
  if(!ctx||!MU.img)return;
  ctx.clearRect(0,0,MU.canvas.width,MU.canvas.height);
  ctx.drawImage(MU.img,0,0);
  const COLOR='#ef5350';
  const fs=Math.max(36,Math.round(MU.img.width*0.045));
  const lw=Math.max(4,Math.round(MU.img.width*0.006));
  ctx.font='bold '+fs+'px Montserrat, Arial, sans-serif';
  (S.markup.annotations||[]).forEach((a,i)=>{
    const isSel=S.markup.tool==='select'&&i===S.markup.selectedIdx;
    ctx.strokeStyle=isSel?'#ff8a80':COLOR;
    ctx.fillStyle=isSel?'#ff8a80':COLOR;
    ctx.lineWidth=isSel?lw+3:lw;
    if(a.type==='circle'){
      ctx.beginPath();ctx.arc(a.cx,a.cy,a.r,0,Math.PI*2);ctx.stroke();
    } else if(a.type==='text'){
      const olw=Math.max(3,Math.round(fs*0.12));
      ctx.lineWidth=olw; ctx.lineJoin='round'; ctx.strokeStyle='white';
      ctx.strokeText(a.text,a.x,a.y);
      ctx.fillStyle=isSel?'#ff8a80':COLOR;
      ctx.fillText(a.text,a.x,a.y);
    }
  });
  if(opts&&opts.preview&&MU.drawing){
    const dx=opts.preview.x-MU.startX,dy=opts.preview.y-MU.startY;
    const r=Math.sqrt(dx*dx+dy*dy);
    ctx.globalAlpha=0.5;ctx.strokeStyle=COLOR;ctx.lineWidth=lw;
    ctx.beginPath();ctx.arc(MU.startX,MU.startY,r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

function muSetTool(t){
  S.markup.tool=t;
  S.markup.textInput=null;
  S.markup.selectedIdx=null;
  S.markup.dragStart=null;
  render();
  requestAnimationFrame(initMarkupCanvas);
}
function muDeleteSelected(){
  if(S.markup.selectedIdx===null)return;
  S.markup.annotations.splice(S.markup.selectedIdx,1);
  S.markup.selectedIdx=null;
  render();
  requestAnimationFrame(initMarkupCanvas);
}
function muUndo(){
  if(S.markup.annotations.length) S.markup.annotations.pop();
  drawMarkup();
}
function muConfirmText(){
  const ti=S.markup.textInput;
  if(ti&&ti.text.trim()){
    S.markup.annotations.push({type:"text",x:ti.x,y:ti.y+24,text:ti.text});
  }
  S.markup.textInput=null;
  render();
  requestAnimationFrame(initMarkupCanvas);
}

  const {no,idx}=S.markup;

  const _hasModal=!!_dispSheet||_pnListOpen||!!_processModal||S.showSettings||S.showEmail||!!_recDatePicker||S.showXlsxSel||S.showCsvSel||S.showCsvPicker||S.showLeavePrompt||!!_editDateId;
  document.body.style.overflow=_hasModal?'hidden':'';

  if(_focId){const el=document.getElementById(_focId);if(el){el.focus();if(_focSS!=null&&el.setSelectionRange)try{el.setSelectionRange(_focSS,_focSE!=null?_focSE:_focSS);}catch(e){}}}
  _applyItemSearch();_applyPnNameSearch();
  const fab=document.getElementById('scroll-fab');

    fab.style.display=(S.screen==='checklist'&&!S.markup&&!S.viewPhoto&&!S.showEmail)?'flex':'none';
    updateFab();
  }
}

function fabAtBottom(){const sh=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight);return window.innerHeight+window.scrollY>=sh-20;}
function fabTap(){
  const fab=document.getElementById('scroll-fab');
  if(fabAtBottom()){
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    window.scrollTo({top:Math.max(document.body.scrollHeight,document.documentElement.scrollHeight),behavior:'smooth'});
  }
}
function updateFab(){
  const fab=document.getElementById('scroll-fab');
  if(!fab||fab.style.display==='none')return;
  fab.textContent=fabAtBottom()?'↑':'↓';
}

// iOS-safe outside-tap detection for picker close
// Pickers are closed only by pressing D again (cycle away from defective),
// not by outside tap. Screen transitions reset S.pickerOpen via openInvoice/resetApp.

/* ────── MARKUP CANVAS ENGINE ────── */
let MK={canvas:null,ctx:null,img:null,drawing:false,startX:0,startY:0};

function initMarkupCanvas(){
  const canvas=document.getElementById('mkup-canvas');
  if(!canvas||!S.markup)return;
  MK.drawing=false;
  MK.canvas=canvas; MK.ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    MK.img=img;
    const wrap=document.getElementById('mkup-wrap');
    const scale=Math.min(wrap.clientWidth/img.width, wrap.clientHeight/img.height, 1);
    canvas.width=img.width; canvas.height=img.height;
    canvas.style.width=Math.round(img.width*scale)+'px';
    canvas.style.height=Math.round(img.height*scale)+'px';
    redrawMarkup(); addMarkupEvents();
  };
  img.src=S.markup.src;
}

function redrawMarkup(){
  const {ctx,canvas,img}=MK;
  if(!ctx||!img)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);
  const lw=Math.max(4,canvas.width/150);
  ctx.strokeStyle='#e53935';
  ctx.lineWidth=lw;
  ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.shadowBlur=10;
  (S.markup.strokes||[]).forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.cx,s.cy,s.r,0,Math.PI*2);
    ctx.stroke();
  });
  ctx.shadowBlur=0;
}

function getPos(e){
  const canvas=MK.canvas;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const src=e.touches&&e.touches.length?e.touches[0]:(e.changedTouches&&e.changedTouches.length?e.changedTouches[0]:e);
  return{x:(src.clientX-rect.left)*scaleX, y:(src.clientY-rect.top)*scaleY};
}

function addMarkupEvents(){
  const canvas=MK.canvas;
  if(!canvas||canvas._mkupEventsAdded)return;
  canvas._mkupEventsAdded=true;

  const onStart=e=>{
    if(!S.markup)return;
    e.preventDefault();
    const pos=getPos(e);
    MK.drawing=true; MK.startX=pos.x; MK.startY=pos.y;
  };
  const onMove=e=>{
    if(!MK.drawing)return;
    e.preventDefault();
    const pos=getPos(e);
    const r=Math.max(Math.sqrt((pos.x-MK.startX)**2+(pos.y-MK.startY)**2),8);
    redrawMarkup();
    MK.ctx.strokeStyle='#e53935';
    MK.ctx.lineWidth=Math.max(4,canvas.width/150);
    MK.ctx.shadowColor='rgba(0,0,0,0.5)'; MK.ctx.shadowBlur=10;
    MK.ctx.beginPath(); MK.ctx.arc(MK.startX,MK.startY,r,0,Math.PI*2); MK.ctx.stroke();
    MK.ctx.shadowBlur=0;
  };
  const onEnd=e=>{
    if(!MK.drawing)return;
    e.preventDefault(); MK.drawing=false;
    const pos=getPos(e);
    const r=Math.max(Math.sqrt((pos.x-MK.startX)**2+(pos.y-MK.startY)**2),8);
    S.markup.strokes=[{cx:MK.startX,cy:MK.startY,r}]; // 赤丸は常に1つ
    redrawMarkup();
  };
  canvas.addEventListener('touchstart',onStart,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onEnd,{passive:false});
  canvas.addEventListener('mousedown',onStart);
  canvas.addEventListener('mousemove',onMove);
  canvas.addEventListener('mouseup',onEnd);
}

function confirmReedit(){
  S.markup._reedit=false;
  S.markup._burnedSrc=null;
  render();
  requestAnimationFrame(initMarkupCanvas);
}

function doneMarkup(){
  if(!S.markup)return;
  try{
    const canvas=MK.canvas;
    if(!canvas||!MK.img)return;
    // Burn label onto an off-screen canvas (preserves MK.canvas for back-to-edit)
    const off=document.createElement('canvas');
    off.width=canvas.width; off.height=canvas.height;
    const offCtx=off.getContext('2d');
    offCtx.drawImage(canvas,0,0);
    const label=(document.getElementById('mkup-label-inp')||{}).value||S.markup.autoLabel||'';
    S.markup.autoLabel=label; // persist label value for re-render
    if(label){
      const fs=Math.max(28,Math.round(canvas.width/22))+2;
      const pad=Math.round(canvas.width*0.025);
      offCtx.font='bold '+fs+'px Montserrat,Arial,sans-serif';
      const olw=Math.max(3,Math.round(fs*0.12));
      offCtx.lineWidth=olw; offCtx.lineJoin='round'; offCtx.strokeStyle='white';
      const stroke=(S.markup.strokes||[])[0];
      if(stroke){
        offCtx.textAlign='center';
        const tx=stroke.cx;
        const ty=Math.max(fs+4, stroke.cy-stroke.r-30);
        offCtx.strokeText(label, tx, ty);
        offCtx.fillStyle='#e53935';
        offCtx.fillText(label, tx, ty);
      } else {
        offCtx.textAlign='left';
        offCtx.strokeText(label, pad+10, pad+fs+25);
        offCtx.fillStyle='#e53935';
        offCtx.fillText(label, pad+10, pad+fs+25);
      }
    }
    S.markup._preview=off.toDataURL('image/jpeg',0.65);
    render();
  }catch(e){console.error('doneMarkup error:', e);}
}
function confirmMarkup(){
  if(!S.markup||!S.markup._preview)return;
  try{
    const b64=S.markup._preview;
    const bKey=photoKey();
    idbPut(bKey,b64);
    const {no,photoIdx}=S.markup;
    S.invoice.items=S.invoice.items.map(it=>{
      if(it.no!==no)return it;
      const photos=[...(it.photos||[])];
      const origPhotos=[...(it.origPhotos||[])];
      if(photoIdx===null||photoIdx===undefined){
        photos.push(bKey);
      } else {
        const old=photos[photoIdx];
        if(old&&!old.startsWith('data:'))_deletePhoto(old);
        photos[photoIdx]=bKey;
      }
      return{...it,photos,origPhotos};
    });
    save();
  }catch(e){console.error('confirmMarkup error:', e);}
  finally{S.markup=null; render();}
}
function backToEdit(){
  if(!S.markup)return;
  S.markup._preview=null;
  render();
  requestAnimationFrame(initMarkupCanvas);
}
function cancelMarkup(){
  S.markup=null;
  render();
}

window.addEventListener('beforeunload',e=>{
  if(_dirty&&gPat()&&gId()){e.preventDefault();e.returnValue='';}
});
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    if(_dirty&&gPat()&&gId())gistPush().catch(()=>{});
  }else if(document.visibilityState==='visible'){
    if(S.screen==='home'&&gPat()&&gId()&&!_gistPulling&&!S.pushing){
      gistAutoSync();
    }
  }
});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){
    e.preventDefault();
    if(S.pushing)return;
    if(!gPat()||!gId()){alert('TokenとGist IDを設定してください');return;}
    if(confirm('Push しますか？')){gistPush();}
  }
});
